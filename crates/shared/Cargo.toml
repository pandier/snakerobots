[package]
name = "snakerobots-shared"
version = "0.1.0"
edition = "2024"

[features]
lang = ["dep:tropaion"]
default = []

[dependencies]
rand = "0.10"
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }

tropaion = { git = "ssh://git@github.com/MiranCZ/Tropaion.git", rev = "950f0c93c3d37d57a822360bbb55782cac275dfa", optional = true }
