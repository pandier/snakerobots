[package]
name = "snakerobots-shared"
version = "0.1.0"
edition = "2024"

[features]
lang = ["dep:tropaion"]
default = []

[dependencies]
rand = "0.10"
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }

tropaion = { git = "ssh://git@github.com/MiranCZ/Tropaion.git", rev = "10583b508c4f96cc14aa6e830aa93a56909c25f3", optional = true }

[[example]]
name = "terminal"
required-features = ["lang"]
