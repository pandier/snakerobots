name: snakerobots-prod

services:
  db:
    image: postgres:18
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql
    env_file:
      - .env
  app:
    build:
      context: ../..
      dockerfile: server-arm.Dockerfile
      ssh:
        - default
    restart: always
    depends_on:
      - db
    ports:
      - "3000:3000"
    environment:
      SESSION_TIMEOUT: 604800
      MATCHMAKER_INTERVAL: 300
      MIGRATE: true
    env_file:
      - .env
  worker:
    build:
      context: ../..
      dockerfile: worker-arm.Dockerfile
      ssh:
        - default
    restart: always
    depends_on:
      - db
    environment:
      WORKER_INTERVAL: 15
      WORKER_MAX_GAMES: 2
    env_file:
      - .env

volumes:
  db_data:
