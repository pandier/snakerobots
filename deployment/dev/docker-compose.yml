name: snakerobots-dev

services:
  db:
    image: postgres:18
    restart: always
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: snakerobots
    ports:
      - "48924:5432"
    volumes:
      - db_data:/var/lib/postgresql
  app:
    build:
      context: ../..
      dockerfile: server.Dockerfile
    restart: always
    depends_on:
      - db
    ports:
      - "48923:3000"
    environment:
      RUST_LOG: debug
      DATABASE_URL: postgres://devuser:devpass@db:5432/snakerobots
      SESSION_TIMEOUT: 604800
      MATCHMAKER_INTERVAL: 300
      MIGRATE: false
    env_file:
      - .env
  worker:
    build:
      context: ../..
      dockerfile: worker.Dockerfile
    restart: always
    depends_on:
      - db
    environment:
      RUST_LOG: snakerobots_worker=debug
      DATABASE_URL: postgres://devuser:devpass@db:5432/snakerobots
      WORKER_INTERVAL: 15
      WORKER_MAX_GAMES: 1

volumes:
  db_data:
